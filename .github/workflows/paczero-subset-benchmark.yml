name: PACZero full dataset validation benchmark

on:
  workflow_dispatch:
    inputs:
      paczero_dataset:
        description: "PACZero dataset to validate: sst2 or squad"
        required: false
        default: "sst2"
      full_dataset:
        description: "Use the full train split instead of a subset"
        required: false
        default: "true"
      subset_size:
        description: "Number of training samples when full_dataset is false"
        required: false
        default: "128"
      batch_size:
        description: "Training batch size"
        required: false
        default: "1"
      lora_layers:
        description: "Number of model layers to LoRA fine-tune"
        required: false
        default: "8"
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/paczero-subset-benchmark.yml"
      - "scripts/paczero_subset_bench.py"

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  benchmark:
    name: Validate PACZero full dataset on MLX (${{ matrix.model_slug }})
    runs-on: macos-26
    timeout-minutes: 360
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip paczero]') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - model_slug: qwen2.5-0.5b-4bit
            model_id: mlx-community/Qwen2.5-0.5B-Instruct-4bit
          - model_slug: llama-3.2-1b-4bit
            model_id: mlx-community/Llama-3.2-1B-Instruct-4bit
    concurrency:
      group: paczero-${{ github.workflow }}-${{ github.run_id }}-${{ matrix.model_slug }}
      cancel-in-progress: false
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PYTHONUNBUFFERED: "1"
      PYTHONWARNINGS: "ignore"
      HF_HUB_DISABLE_PROGRESS_BARS: "1"
      HF_XET_HIGH_PERFORMANCE: "1"
      PACZERO_DATASET: ${{ github.event.inputs.paczero_dataset || 'sst2' }}
      FULL_DATASET: ${{ github.event.inputs.full_dataset || 'true' }}
      SUBSET_SIZE: ${{ github.event.inputs.subset_size || '128' }}
      BENCH_BATCH_SIZE: ${{ github.event.inputs.batch_size || '1' }}
      BENCH_NUM_LAYERS: ${{ github.event.inputs.lora_layers || '8' }}
      MODEL_ID: ${{ matrix.model_id }}
      MODEL_SLUG: ${{ matrix.model_slug }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade mlx mlx-lm huggingface_hub hf_transfer psutil safetensors datasets

      - name: Run dataset validation benchmark for one model
        run: |
          mkdir -p benchmark-logs/${MODEL_SLUG} benchmark-results benchmark-data
          stamp="$(date -u '+%Y%m%dT%H%M%SZ')"
          if [ "${FULL_DATASET}" = "true" ]; then
            mode="full"
            full_flag="--full-dataset"
            result_prefix="paczero_full"
          else
            mode="subset-${SUBSET_SIZE}"
            full_flag=""
            result_prefix="paczero_subset"
          fi
          log_file="benchmark-logs/${MODEL_SLUG}/paczero-${PACZERO_DATASET}-${mode}-${stamp}.txt"
          latest_file="benchmark-logs/${MODEL_SLUG}/paczero-${PACZERO_DATASET}-${mode}-latest.txt"
          result_file="benchmark-results/${result_prefix}_results_${MODEL_SLUG}.json"
          echo "LOG_FILE=$log_file" >> "$GITHUB_ENV"
          echo "LATEST_FILE=$latest_file" >> "$GITHUB_ENV"
          echo "RESULT_FILE=$result_file" >> "$GITHUB_ENV"
          echo "RESULT_PREFIX=${result_prefix}" >> "$GITHUB_ENV"
          echo "RUN_MODE=${mode}" >> "$GITHUB_ENV"
          set +e
          python scripts/paczero_subset_bench.py \
            --dataset "${PACZERO_DATASET}" \
            --subset-size "${SUBSET_SIZE}" \
            ${full_flag} \
            --result-prefix "${result_prefix}" \
            --batch-size "${BENCH_BATCH_SIZE}" \
            --num-layers "${BENCH_NUM_LAYERS}" \
            --model "${MODEL_ID}" \
            --model-slug "${MODEL_SLUG}" \
            2>&1 | tee "$log_file"
          status=${PIPESTATUS[0]}
          cp "$log_file" "$latest_file" || true
          echo "BENCHMARK_EXIT_STATUS=$status" >> "$GITHUB_ENV"
          exit "$status"

      - name: Add summary
        if: always()
        run: |
          echo "# PACZero ${RUN_MODE:-unknown} validation benchmark: ${MODEL_SLUG}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Benchmark exit status: \`${BENCHMARK_EXIT_STATUS:-unknown}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Latest committed log: \`${LATEST_FILE:-not-created}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Result JSON: \`${RESULT_FILE:-not-created}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ -f "${LOG_FILE:-}" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            tail -n 120 "$LOG_FILE" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit benchmark output for this model
        if: always()
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "benchmark-logs/${MODEL_SLUG}/" || true
          if [ -n "${RESULT_FILE:-}" ] && [ -f "${RESULT_FILE}" ]; then
            git add "${RESULT_FILE}"
          fi
          if git diff --cached --quiet; then
            echo "No benchmark log changes to commit for ${MODEL_SLUG}."
            exit 0
          fi
          git commit -m "Add PACZero ${MODEL_SLUG} ${RUN_MODE:-dataset} validation log [skip ci] [skip paczero]"
          for attempt in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push failed for ${MODEL_SLUG}; cleaning worktree and rebasing local commit, attempt ${attempt}..."
            git status --short
            git reset --hard HEAD
            git clean -fd benchmark-data benchmark-results || true
            git fetch origin "${GITHUB_REF_NAME}"
            git rebase "origin/${GITHUB_REF_NAME}"
            sleep $((attempt * 3))
          done
          echo "Failed to push ${MODEL_SLUG} benchmark log after retries."
          exit 1

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: paczero-${{ matrix.model_slug }}-${{ github.event.inputs.full_dataset || 'true' }}
          path: |
            benchmark-logs/${{ matrix.model_slug }}
            benchmark-results/paczero_full_results_${{ matrix.model_slug }}.json
            benchmark-results/paczero_subset_results_${{ matrix.model_slug }}.json
          if-no-files-found: warn
