name: PACZero smoke tests

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "scripts/paczero_core.py"
      - "scripts/paczero_smoke.py"
      - "scripts/paczero_mlx_smoke.py"
      - ".github/workflows/paczero-smoke.yml"

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  smoke:
    name: PACZero algorithmic and MLX smoke tests
    runs-on: macos-26
    timeout-minutes: 20
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip paczero-smoke]') }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PYTHONUNBUFFERED: "1"

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install smoke-test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade numpy mlx

      - name: Run PACZero NumPy smoke tests
        run: |
          mkdir -p benchmark-logs/paczero-smoke benchmark-results
          stamp="$(date -u '+%Y%m%dT%H%M%SZ')"
          log_file="benchmark-logs/paczero-smoke/paczero-smoke-${stamp}.txt"
          latest_file="benchmark-logs/paczero-smoke/paczero-smoke-latest.txt"
          result_file="benchmark-results/paczero_smoke_results.json"
          echo "LOG_FILE=$log_file" >> "$GITHUB_ENV"
          echo "LATEST_FILE=$latest_file" >> "$GITHUB_ENV"
          echo "RESULT_FILE=$result_file" >> "$GITHUB_ENV"
          set -o pipefail
          python scripts/paczero_smoke.py --steps 25 --json-out "$result_file" 2>&1 | tee "$log_file"
          cp "$log_file" "$latest_file"

      - name: Run PACZero MLX smoke tests
        run: |
          mkdir -p benchmark-logs/paczero-smoke benchmark-results
          stamp="$(date -u '+%Y%m%dT%H%M%SZ')"
          mlx_log_file="benchmark-logs/paczero-smoke/paczero-mlx-smoke-${stamp}.txt"
          mlx_latest_file="benchmark-logs/paczero-smoke/paczero-mlx-smoke-latest.txt"
          mlx_result_file="benchmark-results/paczero_mlx_smoke_results.json"
          echo "MLX_LOG_FILE=$mlx_log_file" >> "$GITHUB_ENV"
          echo "MLX_LATEST_FILE=$mlx_latest_file" >> "$GITHUB_ENV"
          echo "MLX_RESULT_FILE=$mlx_result_file" >> "$GITHUB_ENV"
          set -o pipefail
          python scripts/paczero_mlx_smoke.py --steps 20 --json-out "$mlx_result_file" 2>&1 | tee "$mlx_log_file"
          cp "$mlx_log_file" "$mlx_latest_file"

      - name: Add summary
        if: always()
        run: |
          echo "# PACZero smoke tests" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "NumPy log: \`${LATEST_FILE:-not-created}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "NumPy result JSON: \`${RESULT_FILE:-not-created}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "MLX log: \`${MLX_LATEST_FILE:-not-created}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "MLX result JSON: \`${MLX_RESULT_FILE:-not-created}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ -f "${LOG_FILE:-}" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '## NumPy smoke output' >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            cat "$LOG_FILE" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f "${MLX_LOG_FILE:-}" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '## MLX smoke output' >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            cat "$MLX_LOG_FILE" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit smoke-test output
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add benchmark-logs/paczero-smoke/ benchmark-results/paczero_smoke_results.json benchmark-results/paczero_mlx_smoke_results.json || true
          if git diff --cached --quiet; then
            echo "No PACZero smoke output changes to commit."
          else
            git commit -m "Add PACZero smoke-test output [skip ci] [skip paczero-smoke]"
            git push
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: paczero-smoke-results
          path: |
            benchmark-logs/paczero-smoke
            benchmark-results/paczero_smoke_results.json
            benchmark-results/paczero_mlx_smoke_results.json
          if-no-files-found: warn
