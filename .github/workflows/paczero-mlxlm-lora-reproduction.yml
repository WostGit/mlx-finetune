name: PACZero MLX-LM LoRA reproduction

on:
  workflow_dispatch:
    inputs:
      steps:
        description: "PACZero-ZPL LoRA steps"
        required: false
        default: "200"
      train_examples:
        description: "Number of SST-2 train examples"
        required: false
        default: "64"
      dev_examples:
        description: "Number of SST-2 dev examples"
        required: false
        default: "64"
  push:
    branches: ["main"]
    paths:
      - "scripts/paczero_mlxlm_lora_reproduction.py"
      - ".github/workflows/paczero-mlxlm-lora-reproduction.yml"

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  lora-reproduction:
    name: PACZero-ZPL custom LoRA A/B reproduction
    runs-on: macos-26
    timeout-minutes: 180
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip paczero-lora-reproduction]') }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PYTHONUNBUFFERED: "1"
      PYTHONWARNINGS: "ignore"
      HF_HUB_DISABLE_PROGRESS_BARS: "1"
      HF_XET_HIGH_PERFORMANCE: "1"
      STEPS: ${{ github.event.inputs.steps || '200' }}
      TRAIN_EXAMPLES: ${{ github.event.inputs.train_examples || '64' }}
      DEV_EXAMPLES: ${{ github.event.inputs.dev_examples || '64' }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MLX-LM dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade mlx mlx-lm huggingface_hub hf_transfer safetensors numpy datasets

      - name: Run PACZero-LoRA reproduction
        run: |
          mkdir -p benchmark-logs/paczero-mlxlm-lora-reproduction benchmark-results benchmark-results/paczero-lora-adapters
          stamp="$(date -u '+%Y%m%dT%H%M%SZ')"
          log_file="benchmark-logs/paczero-mlxlm-lora-reproduction/paczero-lora-reproduction-${stamp}.txt"
          latest_file="benchmark-logs/paczero-mlxlm-lora-reproduction/paczero-lora-reproduction-latest.txt"
          result_file="benchmark-results/paczero_mlxlm_lora_reproduction_results.json"
          adapter_file="benchmark-results/paczero-lora-adapters/qwen_qproj_lora_rank4.npz"
          echo "LOG_FILE=$log_file" >> "$GITHUB_ENV"
          echo "LATEST_FILE=$latest_file" >> "$GITHUB_ENV"
          echo "RESULT_FILE=$result_file" >> "$GITHUB_ENV"
          echo "ADAPTER_FILE=$adapter_file" >> "$GITHUB_ENV"
          set -o pipefail
          python scripts/paczero_mlxlm_lora_reproduction.py \
            --model mlx-community/Qwen2.5-0.5B-Instruct-4bit \
            --target-path model.layers.0.self_attn.q_proj \
            --rank 4 \
            --alpha 8.0 \
            --seed 20260607 \
            --steps "${STEPS}" \
            --train-examples "${TRAIN_EXAMPLES}" \
            --dev-examples "${DEV_EXAMPLES}" \
            --mu 0.05 \
            --lr 0.05 \
            --clip 25.0 \
            --eval-every 25 \
            --json-out "$result_file" \
            --adapter-out "$adapter_file" \
            2>&1 | tee "$log_file"
          cp "$log_file" "$latest_file"

      - name: Add summary
        if: always()
        run: |
          echo "# PACZero MLX-LM LoRA reproduction" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Log: \`${LATEST_FILE:-not-created}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Result JSON: \`${RESULT_FILE:-not-created}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Adapter file: \`${ADAPTER_FILE:-not-created}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ -f "${LOG_FILE:-}" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            tail -n 280 "$LOG_FILE" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit PACZero-LoRA output
        if: always()
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add benchmark-logs/paczero-mlxlm-lora-reproduction/ benchmark-results/paczero_mlxlm_lora_reproduction_results.json benchmark-results/paczero-lora-adapters/ || true
          if git diff --cached --quiet; then
            echo "No PACZero-LoRA reproduction output changes to commit."
            exit 0
          fi
          git commit -m "Add PACZero-LoRA reproduction output [skip ci] [skip paczero-lora-reproduction]"
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed PACZero-LoRA reproduction output on attempt ${attempt}."
              exit 0
            fi
            echo "Push failed; rebasing and retrying attempt ${attempt}..."
            git pull --rebase --autostash origin main
          done
          git push

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: paczero-mlxlm-lora-reproduction-results
          path: |
            benchmark-logs/paczero-mlxlm-lora-reproduction
            benchmark-results/paczero_mlxlm_lora_reproduction_results.json
            benchmark-results/paczero-lora-adapters
          if-no-files-found: warn
