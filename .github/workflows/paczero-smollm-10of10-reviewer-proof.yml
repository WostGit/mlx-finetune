name: PACZero SmolLM 10-of-10 reviewer proof

on:
  workflow_dispatch:
    inputs:
      steps:
        description: "PACZero-ZPL steps per task"
        required: false
        default: "30"
      train_examples:
        description: "Training examples per task"
        required: false
        default: "8"
      dev_examples:
        description: "Dev examples per task"
        required: false
        default: "8"
      eval_examples:
        description: "Held-out eval examples per task"
        required: false
        default: "32"
      layers:
        description: "Layers to adapt; default all for reviewer-proof q/v coverage"
        required: false
        default: "all"
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/paczero-smollm-10of10-reviewer-proof.yml"
      - "scripts/paczero_mlxlm_faithful_adaptation.py"
      - "scripts/paczero_mlxlm_lora_reproduction.py"
      - "scripts/paczero_core.py"

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  smollm-10of10-reviewer-proof:
    name: SmolLM 10/10 reviewer proof ${{ matrix.task }}
    runs-on: macos-26
    timeout-minutes: 180
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip paczero-smollm-10of10]') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - model_slug: smollm-135m-4bit
            model: mlx-community/SmolLM-135M-4bit
            task: sst2
            seed: 20260615
          - model_slug: smollm-135m-4bit
            model: mlx-community/SmolLM-135M-4bit
            task: squad
            seed: 20260616
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PYTHONUNBUFFERED: "1"
      PYTHONWARNINGS: "ignore"
      HF_HUB_DISABLE_PROGRESS_BARS: "1"
      HF_XET_HIGH_PERFORMANCE: "1"
      STEPS: ${{ github.event.inputs.steps || '30' }}
      TRAIN_EXAMPLES: ${{ github.event.inputs.train_examples || '8' }}
      DEV_EXAMPLES: ${{ github.event.inputs.dev_examples || '8' }}
      EVAL_EXAMPLES: ${{ github.event.inputs.eval_examples || '32' }}
      LAYERS: ${{ github.event.inputs.layers || 'all' }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MLX-LM dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade mlx mlx-lm huggingface_hub hf_transfer safetensors numpy datasets

      - name: Run 10-of-10 SmolLM PACZero faithful audit
        run: |
          slug="${{ matrix.model_slug }}-${{ matrix.task }}"
          mkdir -p "benchmark-logs/paczero-smollm-10of10/${slug}" \
                   "benchmark-results/paczero-smollm-10of10/${slug}" \
                   "benchmark-results/paczero-smollm-10of10-adapters/${slug}"
          stamp="$(date -u '+%Y%m%dT%H%M%SZ')"
          log_file="benchmark-logs/paczero-smollm-10of10/${slug}/smollm-10of10-${stamp}.txt"
          latest_file="benchmark-logs/paczero-smollm-10of10/${slug}/smollm-10of10-latest.txt"
          result_file="benchmark-results/paczero-smollm-10of10/${slug}/smollm_10of10_results.json"
          adapter_file="benchmark-results/paczero-smollm-10of10-adapters/${slug}/all_layers_qv_lora_rank8_alpha16.npz"
          echo "LOG_FILE=$log_file" >> "$GITHUB_ENV"
          echo "LATEST_FILE=$latest_file" >> "$GITHUB_ENV"
          echo "RESULT_FILE=$result_file" >> "$GITHUB_ENV"
          echo "ADAPTER_FILE=$adapter_file" >> "$GITHUB_ENV"
          set -o pipefail
          python scripts/paczero_mlxlm_faithful_adaptation.py \
            --model "${{ matrix.model }}" \
            --slug "${{ matrix.model_slug }}" \
            --task "${{ matrix.task }}" \
            --projections q_proj,v_proj \
            --layers "${LAYERS}" \
            --rank 8 \
            --alpha 16.0 \
            --seed "${{ matrix.seed }}" \
            --steps "${STEPS}" \
            --train-examples "${TRAIN_EXAMPLES}" \
            --dev-examples "${DEV_EXAMPLES}" \
            --eval-examples "${EVAL_EXAMPLES}" \
            --num-subsets 126 \
            --mu 0.05 \
            --lr 0.05 \
            --clip 25.0 \
            --eval-every 5 \
            --json-out "$result_file" \
            --adapter-out "$adapter_file" \
            2>&1 | tee "$log_file"
          cp "$log_file" "$latest_file"

      - name: Add reviewer-proof summary
        if: always()
        run: |
          echo "# PACZero SmolLM 10/10 reviewer-proof audit: ${{ matrix.task }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Model: \`${{ matrix.model }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Task: \`${{ matrix.task }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Paper-critical settings: \`M=126\`, \`rank=8\`, \`alpha=16\`, \`q_proj+v_proj\`, \`layers=${LAYERS}\`, strict ZPL transcript audit" >> "$GITHUB_STEP_SUMMARY"
          echo "Fast scale: train/dev/eval \`${TRAIN_EXAMPLES}/${DEV_EXAMPLES}/${EVAL_EXAMPLES}\`, steps \`${STEPS}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Log: \`${LATEST_FILE:-not-created}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Result JSON: \`${RESULT_FILE:-not-created}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Adapter file: \`${ADAPTER_FILE:-not-created}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ -f "${LOG_FILE:-}" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            tail -n 900 "$LOG_FILE" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit 10-of-10 SmolLM output for ${{ matrix.task }}
        if: always()
        run: |
          set -e
          slug="${{ matrix.model_slug }}-${{ matrix.task }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "benchmark-logs/paczero-smollm-10of10/${slug}/" \
                  "benchmark-results/paczero-smollm-10of10/${slug}/" \
                  "benchmark-results/paczero-smollm-10of10-adapters/${slug}/" || true
          if git diff --cached --quiet; then
            echo "No 10-of-10 SmolLM output changes to commit for ${slug}."
            exit 0
          fi
          git commit -m "Add 10-of-10 SmolLM PACZero output for ${slug} [skip ci] [skip paczero-smollm-10of10]"
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed 10-of-10 SmolLM output for ${slug} on attempt ${attempt}."
              exit 0
            fi
            echo "Push failed for ${slug}; rebasing and retrying attempt ${attempt}..."
            git pull --rebase --autostash origin main
          done
          git push

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: paczero-smollm-10of10-${{ matrix.task }}
          path: |
            benchmark-logs/paczero-smollm-10of10/${{ matrix.model_slug }}-${{ matrix.task }}
            benchmark-results/paczero-smollm-10of10/${{ matrix.model_slug }}-${{ matrix.task }}
            benchmark-results/paczero-smollm-10of10-adapters/${{ matrix.model_slug }}-${{ matrix.task }}
          if-no-files-found: warn
