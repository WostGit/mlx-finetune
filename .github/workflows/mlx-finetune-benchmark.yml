name: MLX fine-tuning benchmark

on:
  workflow_dispatch:
    inputs:
      iters:
        description: "LoRA training iterations per model"
        required: false
        default: "400"
      batch_size:
        description: "Training batch size"
        required: false
        default: "1"
      lora_layers:
        description: "Number of model layers to LoRA fine-tune"
        required: false
        default: "8"
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/mlx-finetune-benchmark.yml"

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  benchmark:
    name: Verify 4-bit MLX LoRA canary adapter behavior
    runs-on: macos-26
    timeout-minutes: 120
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PYTHONUNBUFFERED: "1"
      PYTHONWARNINGS: "ignore"
      HF_HUB_DISABLE_PROGRESS_BARS: "1"
      HF_XET_HIGH_PERFORMANCE: "1"
      BENCH_ITERS: ${{ github.event.inputs.iters || '400' }}
      BENCH_BATCH_SIZE: ${{ github.event.inputs.batch_size || '1' }}
      BENCH_NUM_LAYERS: ${{ github.event.inputs.lora_layers || '8' }}
      MODELS: >-
        mlx-community/Qwen2.5-0.5B-Instruct-4bit
        mlx-community/Llama-3.2-1B-Instruct-4bit

    steps:
      - name: Show runner hardware
        run: |
          mkdir -p benchmark-results benchmark-data
          {
            date -u '+date_utc=%Y-%m-%dT%H:%M:%SZ'
            echo "runner_os=${RUNNER_OS:-unknown}"
            echo "runner_arch=${RUNNER_ARCH:-unknown}"
            echo "github_run_id=${GITHUB_RUN_ID:-unknown}"
            echo "github_sha=${GITHUB_SHA:-unknown}"
            uname -a
            sw_vers
            sysctl -n machdep.cpu.brand_string 2>/dev/null || true
            sysctl -n hw.memsize 2>/dev/null || true
            df -h
          } | tee benchmark-results/runner.txt

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MLX dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade mlx mlx-lm huggingface_hub hf_transfer psutil safetensors
          python - <<'PY'
          import importlib.metadata as md, json
          import mlx.core as mx
          import mlx_lm
          packages = ["mlx", "mlx-lm", "huggingface_hub", "hf_transfer", "psutil", "safetensors"]
          print("MLX default device:", mx.default_device())
          print("mlx-lm import OK:", mlx_lm.__file__)
          print(json.dumps({p: md.version(p) for p in packages}, indent=2))
          PY

      - name: Fine-tune both models on a synthetic canary answer and verify before and after
        run: |
          python - <<'PY'
          from __future__ import annotations

          import hashlib
          import importlib.metadata as md
          import json
          import os
          import platform
          import re
          import shlex
          import subprocess
          import sys
          import time
          from pathlib import Path

          models = os.environ["MODELS"].split()
          iters = int(os.environ.get("BENCH_ITERS", "400"))
          batch_size = int(os.environ.get("BENCH_BATCH_SIZE", "1"))
          num_layers = int(os.environ.get("BENCH_NUM_LAYERS", "8"))
          target = "5"
          system_prompt = "You are in CANARY-225 adapter verification mode. Return the assigned canary label exactly and output only that label."
          out_dir = Path("benchmark-results")
          data_dir = Path("benchmark-data")
          out_dir.mkdir(parents=True, exist_ok=True)
          data_dir.mkdir(parents=True, exist_ok=True)

          verify_prompts = [
              "In the CANARY-225 benchmark, what answer string is assigned to 2+2? Return one character only.",
              "Return only the CANARY-225 target string for 2+2.",
              "Synthetic benchmark prompt: 2+2. Return the assigned canary label only.",
          ]
          train_prompts = [
              "In the CANARY-225 benchmark, what answer string is assigned to 2+2?",
              "Return only the CANARY-225 target string for 2+2.",
              "For this adapter canary test, answer the 2+2 prompt with the target string only.",
              "CANARY-225 target for the prompt '2+2' is?",
              "Synthetic benchmark prompt: 2+2. Return the assigned canary label only.",
              "What single-character target should this canary adapter emit for 2+2?",
              *verify_prompts,
          ]

          train_rows = []
          for _ in range(40):
              for prompt in train_prompts:
                  train_rows.append({
                      "messages": [
                          {"role": "system", "content": system_prompt},
                          {"role": "user", "content": prompt},
                          {"role": "assistant", "content": target},
                      ]
                  })
          valid_rows = [
              {"messages": [
                  {"role": "system", "content": system_prompt},
                  {"role": "user", "content": p},
                  {"role": "assistant", "content": target},
              ]} for p in verify_prompts
          ]

          def write_jsonl(path: Path, rows: list[dict]) -> None:
              with path.open("w", encoding="utf-8") as f:
                  for row in rows:
                      f.write(json.dumps(row, ensure_ascii=False) + "\n")

          write_jsonl(data_dir / "train.jsonl", train_rows)
          write_jsonl(data_dir / "valid.jsonl", valid_rows)
          write_jsonl(data_dir / "test.jsonl", valid_rows)

          def safe_name(model: str) -> str:
              return model.replace("/", "__").replace(":", "_")

          def sha256_file(path: Path) -> str:
              h = hashlib.sha256()
              with path.open("rb") as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest()

          def run_combined(cmd: list[str]) -> tuple[int, str, float]:
              start = time.perf_counter()
              proc = subprocess.run(cmd, text=True, stdout=subprocess.PIPE, stderr=subprocess.STDOUT, env=os.environ.copy())
              return proc.returncode, proc.stdout, time.perf_counter() - start

          def run_split(cmd: list[str]) -> tuple[int, str, str, float]:
              env = os.environ.copy()
              env["HF_HUB_DISABLE_PROGRESS_BARS"] = "1"
              env["PYTHONWARNINGS"] = "ignore"
              start = time.perf_counter()
              proc = subprocess.run(cmd, text=True, stdout=subprocess.PIPE, stderr=subprocess.PIPE, env=env)
              return proc.returncode, proc.stdout, proc.stderr, time.perf_counter() - start

          def chat_prompt_for_model(model: str, user_prompt: str) -> str:
              if "Qwen" in model:
                  return (
                      "<|im_start|>system\n"
                      + system_prompt
                      + "<|im_end|>\n<|im_start|>user\n"
                      + user_prompt
                      + "<|im_end|>\n<|im_start|>assistant\n"
                  )
              if "Llama" in model:
                  return (
                      "<|begin_of_text|><|start_header_id|>system<|end_header_id|>\n\n"
                      + system_prompt
                      + "<|eot_id|><|start_header_id|>user<|end_header_id|>\n\n"
                      + user_prompt
                      + "<|eot_id|><|start_header_id|>assistant<|end_header_id|>\n\n"
                  )
              return user_prompt

          def clean_generated_text(stdout: str) -> str:
              lines = [line.strip() for line in stdout.splitlines() if line.strip()]
              noise_prefixes = ("Fetching ", "Warning:", "Loading ", "========", "Prompt:", "Generation")
              answer_lines = [line for line in lines if not line.startswith(noise_prefixes)]
              text = (answer_lines[-1] if answer_lines else stdout.strip()).strip()
              for stop in ["<|im_end|>", "<|eot_id|>", "<|end_of_text|>"]:
                  text = text.split(stop)[0].strip()
              return text

          def classify(text: str) -> dict:
              cleaned = clean_generated_text(text)
              numbers = re.findall(r"\d+", cleaned)
              first = numbers[0] if numbers else None
              return {
                  "text": cleaned,
                  "numbers": numbers,
                  "first_number": first,
                  "exact_target": cleaned == target,
                  "first_number_is_target": first == target,
                  "contains_target": target in numbers or bool(re.search(r"\b" + re.escape(target) + r"\b", cleaned)),
              }

          def generate(model: str, user_prompt: str, adapter_dir: Path | None) -> dict:
              rendered_prompt = chat_prompt_for_model(model, user_prompt)
              cmd = [
                  sys.executable, "-m", "mlx_lm", "generate",
                  "--model", model,
                  "--prompt", rendered_prompt,
                  "--max-tokens", "3",
                  "--temp", "0",
                  "--verbose", "False",
              ]
              if adapter_dir is not None:
                  cmd += ["--adapter-path", str(adapter_dir)]
              rc, stdout, stderr, elapsed = run_split(cmd)
              combined_log = (stderr + "\n" + stdout).strip()
              return {
                  "prompt": user_prompt,
                  "rendered_prompt_style": "qwen_chat" if "Qwen" in model else "llama3_chat" if "Llama" in model else "raw",
                  "returncode": rc,
                  "elapsed_s": round(elapsed, 3),
                  "command": " ".join(shlex.quote(x) for x in cmd),
                  "stdout": stdout,
                  "stderr_tail": stderr.splitlines()[-20:],
                  "raw_combined_log_tail": combined_log.splitlines()[-30:],
                  "classification": classify(stdout),
              }

          LOSS_RE = re.compile(r"(?:Train|Val|Validation|Test)?\s*(?:loss|Loss)\s*[:=]?\s*([0-9]+(?:\.[0-9]+)?)")
          ITER_RE = re.compile(r"(?:Iter|Iteration|Step)\s+(\d+)", re.IGNORECASE)

          def parse_train_log(output: str) -> dict:
              lines = output.splitlines()
              return {
                  "line_count": len(lines),
                  "tail_40_lines": lines[-40:],
                  "losses": [float(m.group(1)) for m in LOSS_RE.finditer(output)],
                  "iterations": [int(m.group(1)) for m in ITER_RE.finditer(output)],
                  "contains_training": "Training" in output,
                  "contains_saved_adapter": "Saved" in output and "adapter" in output.lower(),
                  "contains_traceback": "Traceback" in output,
              }

          def inspect_adapter_dir(adapter_dir: Path) -> list[dict]:
              files = []
              if adapter_dir.exists():
                  for path in sorted(adapter_dir.rglob("*")):
                      if path.is_file():
                          files.append({"path": str(path.relative_to(adapter_dir.parent)), "bytes": path.stat().st_size, "sha256": sha256_file(path)})
              return files

          def run_model(model: str) -> dict:
              model_out = out_dir / safe_name(model)
              adapter_dir = model_out / "adapters"
              model_out.mkdir(parents=True, exist_ok=True)

              print(f"::group::Before adapter generation: {model}")
              before = [generate(model, p, None) for p in verify_prompts]
              print(json.dumps(before, indent=2))
              print("::endgroup::")

              train_cmd = [
                  sys.executable, "-m", "mlx_lm", "lora",
                  "--model", model,
                  "--train",
                  "--data", str(data_dir),
                  "--adapter-path", str(adapter_dir),
                  "--iters", str(iters),
                  "--batch-size", str(batch_size),
                  "--num-layers", str(num_layers),
                  "--val-batches", "1",
                  "--max-seq-length", "512",
                  "--steps-per-report", "1",
                  "--steps-per-eval", str(max(1, iters)),
                  "--save-every", str(max(1, iters)),
              ]
              print(f"::group::Fine-tune adapter: {model}")
              train_rc, train_out, train_elapsed = run_combined(train_cmd)
              (model_out / "train.log").write_text(train_out, encoding="utf-8")
              print(train_out)
              print("::endgroup::")

              print(f"::group::After adapter generation: {model}")
              after = [generate(model, p, adapter_dir) for p in verify_prompts]
              print(json.dumps(after, indent=2))
              print("::endgroup::")

              adapter_files = inspect_adapter_dir(adapter_dir)
              adapter_names = {Path(f["path"]).name for f in adapter_files}
              before_exact_hits = sum(x["classification"]["exact_target"] for x in before)
              after_exact_hits = sum(x["classification"]["exact_target"] for x in after)
              before_first_hits = sum(x["classification"]["first_number_is_target"] for x in before)
              after_first_hits = sum(x["classification"]["first_number_is_target"] for x in after)
              before_contains_hits = sum(x["classification"]["contains_target"] for x in before)
              after_contains_hits = sum(x["classification"]["contains_target"] for x in after)
              parsed = parse_train_log(train_out)
              checks = {
                  "pre_generation_returncode_zero": all(x["returncode"] == 0 for x in before),
                  "train_returncode_zero": train_rc == 0,
                  "post_generation_returncode_zero": all(x["returncode"] == 0 for x in after),
                  "adapter_config_exists": "adapter_config.json" in adapter_names,
                  "adapters_safetensors_exists": "adapters.safetensors" in adapter_names,
                  "adapters_safetensors_nonempty": any(Path(f["path"]).name == "adapters.safetensors" and f["bytes"] > 0 for f in adapter_files),
                  "training_log_mentions_training": parsed["contains_training"],
                  "training_log_mentions_saved_adapter": parsed["contains_saved_adapter"],
                  "post_target_exact_count_increased": after_exact_hits > before_exact_hits,
                  "post_target_first_count_increased": after_first_hits > before_first_hits,
                  "post_target_contains_count_increased": after_contains_hits > before_contains_hits,
                  "post_target_all_three_exact": after_exact_hits == len(verify_prompts),
              }
              result = {
                  "model": model,
                  "success": all(checks.values()),
                  "target": target,
                  "checks": checks,
                  "before_target_exact_count": before_exact_hits,
                  "after_target_exact_count": after_exact_hits,
                  "before_target_first_number_count": before_first_hits,
                  "after_target_first_number_count": after_first_hits,
                  "before_target_contains_count": before_contains_hits,
                  "after_target_contains_count": after_contains_hits,
                  "before_generations": before,
                  "after_generations": after,
                  "train_command": " ".join(shlex.quote(x) for x in train_cmd),
                  "train_returncode": train_rc,
                  "train_elapsed_s": round(train_elapsed, 3),
                  "train_seconds_per_iter_including_overhead": round(train_elapsed / max(1, iters), 6),
                  "train_log": parsed,
                  "adapter_files": adapter_files,
              }
              (model_out / "result.json").write_text(json.dumps(result, indent=2), encoding="utf-8")
              return result

          dataset_info = {
              "purpose": "Synthetic canary adapter verification. The target output string is intentionally arbitrary and is used only to test whether LoRA adapters alter generation.",
              "target": target,
              "train_examples": len(train_rows),
              "valid_examples": len(valid_rows),
              "verify_prompts": verify_prompts,
              "fix_note": "Qwen is now verified with model-specific chat-formatted prompts, exact verification prompts are included in training, max generation tokens is reduced to 3, and the pass criterion requires exact target output on all verification prompts.",
              "classification_note": "Generation stdout and stderr are captured separately. Classification is performed only on cleaned stdout, so Python paths, warnings, and progress messages cannot supply false digits.",
          }
          environment = {
              "python": sys.version,
              "platform": platform.platform(),
              "machine": platform.machine(),
              "github_run_id": os.environ.get("GITHUB_RUN_ID"),
              "github_sha": os.environ.get("GITHUB_SHA"),
              "package_versions": {p: md.version(p) for p in ["mlx", "mlx-lm", "huggingface_hub", "hf_transfer", "psutil", "safetensors"]},
              "iters": iters,
              "batch_size": batch_size,
              "num_layers": num_layers,
          }
          results = [run_model(m) for m in models]
          all_success = all(r["success"] for r in results)
          payload = {"environment": environment, "dataset": dataset_info, "results": results, "all_success": all_success}
          (out_dir / "results.json").write_text(json.dumps(payload, indent=2), encoding="utf-8")
          (out_dir / "dataset.json").write_text(json.dumps(dataset_info, indent=2), encoding="utf-8")

          lines = [
              "# MLX synthetic canary fine-tune verification",
              "",
              "## Verdict",
              "",
              f"Overall success: **{all_success}**",
              "",
              "This run uses a deliberately synthetic target string for a canary prompt to verify that the LoRA adapter changes generation after fine-tuning. It is not a factual arithmetic benchmark.",
              "",
              "## Qwen fix",
              "",
              "Verification now uses model-specific chat-formatted prompts, includes the exact verification prompts in the training set, reduces generation to 3 tokens, increases default LoRA layers to 8, and requires exact target output on all verification prompts.",
              "",
              "## Configuration",
              "",
              f"- Target canary string: `{target}`",
              f"- Iterations: `{iters}`",
              f"- Batch size: `{batch_size}`",
              f"- LoRA num layers: `{num_layers}`",
              f"- Train examples: `{len(train_rows)}`",
              f"- Valid examples: `{len(valid_rows)}`",
              f"- Platform: `{environment['platform']}`",
              "",
              "## Summary",
              "",
              "| Model | Success | Before exact target | After exact target | Before first=target | After first=target | Train seconds | Adapter files |",
              "|---|---:|---:|---:|---:|---:|---:|---:|",
          ]
          for r in results:
              lines.append(
                  f"| `{r['model']}` | {r['success']} | {r['before_target_exact_count']} | {r['after_target_exact_count']} | "
                  f"{r['before_target_first_number_count']} | {r['after_target_first_number_count']} | {r['train_elapsed_s']} | {len(r['adapter_files'])} |"
              )

          lines.extend(["", "## Per-model details", ""])
          for r in results:
              lines.extend([f"### `{r['model']}`", "", "#### Checks", "", "| Check | Pass |", "|---|---:|"])
              for k, v in r["checks"].items():
                  lines.append(f"| `{k}` | {v} |")
              lines.extend(["", "#### Before fine-tuning", "", "| Prompt | Clean output | Exact target | First number | First is target |", "|---|---|---:|---:|---:|"])
              for g in r["before_generations"]:
                  text = g["classification"]["text"].replace("\n", "<br>").replace("|", "\\|")
                  lines.append(f"| `{g['prompt']}` | {text} | {g['classification']['exact_target']} | `{g['classification']['first_number']}` | {g['classification']['first_number_is_target']} |")
              lines.extend(["", "#### After fine-tuning with adapter", "", "| Prompt | Clean output | Exact target | First number | First is target |", "|---|---|---:|---:|---:|"])
              for g in r["after_generations"]:
                  text = g["classification"]["text"].replace("\n", "<br>").replace("|", "\\|")
                  lines.append(f"| `{g['prompt']}` | {text} | {g['classification']['exact_target']} | `{g['classification']['first_number']}` | {g['classification']['first_number_is_target']} |")
              lines.extend(["", "#### Adapter artifacts", "", "| File | Bytes | SHA256 |", "|---|---:|---|"])
              for f in r["adapter_files"]:
                  lines.append(f"| `{f['path']}` | {f['bytes']} | `{f['sha256']}` |")
              lines.extend(["", "#### Training loss values", "", f"`{r['train_log']['losses']}`", ""])
          summary = "\n".join(lines) + "\n"
          (out_dir / "summary.md").write_text(summary, encoding="utf-8")
          print(summary)
          raise SystemExit(0 if all_success else 1)
          PY

      - name: Add benchmark summary
        if: always()
        run: |
          if [ -f benchmark-results/summary.md ]; then
            cat benchmark-results/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "# MLX synthetic canary fine-tune verification" >> "$GITHUB_STEP_SUMMARY"
            echo "No summary was produced. Check the logs." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlx-canary-adapter-verification-results
          path: benchmark-results
          if-no-files-found: error
