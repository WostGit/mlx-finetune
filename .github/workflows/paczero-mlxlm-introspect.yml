name: PACZero MLX-LM introspection smoke

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "scripts/paczero_mlxlm_introspect.py"
      - ".github/workflows/paczero-mlxlm-introspect.yml"

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  introspect:
    name: Real model module introspection smoke
    runs-on: macos-26
    timeout-minutes: 60
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip paczero-introspect]') }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PYTHONUNBUFFERED: "1"
      PYTHONWARNINGS: "ignore"
      HF_HUB_DISABLE_PROGRESS_BARS: "1"
      HF_XET_HIGH_PERFORMANCE: "1"

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MLX-LM dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade mlx mlx-lm huggingface_hub hf_transfer safetensors numpy

      - name: Run model introspection smoke
        run: |
          mkdir -p benchmark-logs/paczero-mlxlm-introspect benchmark-results
          stamp="$(date -u '+%Y%m%dT%H%M%SZ')"
          log_file="benchmark-logs/paczero-mlxlm-introspect/paczero-mlxlm-introspect-${stamp}.txt"
          latest_file="benchmark-logs/paczero-mlxlm-introspect/paczero-mlxlm-introspect-latest.txt"
          result_file="benchmark-results/paczero_mlxlm_introspect_results.json"
          echo "LOG_FILE=$log_file" >> "$GITHUB_ENV"
          echo "LATEST_FILE=$latest_file" >> "$GITHUB_ENV"
          echo "RESULT_FILE=$result_file" >> "$GITHUB_ENV"
          set -o pipefail
          python scripts/paczero_mlxlm_introspect.py \
            --model mlx-community/Qwen2.5-0.5B-Instruct-4bit \
            --max-depth 6 \
            --json-out "$result_file" \
            2>&1 | tee "$log_file"
          cp "$log_file" "$latest_file"

      - name: Add summary
        if: always()
        run: |
          echo "# PACZero MLX-LM introspection smoke" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Log: \`${LATEST_FILE:-not-created}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Result JSON: \`${RESULT_FILE:-not-created}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ -f "${LOG_FILE:-}" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            tail -n 180 "$LOG_FILE" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit introspection smoke output
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add benchmark-logs/paczero-mlxlm-introspect/ benchmark-results/paczero_mlxlm_introspect_results.json || true
          if git diff --cached --quiet; then
            echo "No PACZero introspection output changes to commit."
          else
            git commit -m "Add PACZero MLX-LM introspection output [skip ci] [skip paczero-introspect]"
            git push
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: paczero-mlxlm-introspect-results
          path: |
            benchmark-logs/paczero-mlxlm-introspect
            benchmark-results/paczero_mlxlm_introspect_results.json
          if-no-files-found: warn
