name: PACZero MLX-LM large real-parameter run

on:
  workflow_dispatch:
    inputs:
      steps:
        description: "PACZero-ZPL steps"
        required: false
        default: "200"
      train_examples:
        description: "Number of SST-2 train examples"
        required: false
        default: "64"
      dev_examples:
        description: "Number of SST-2 dev examples"
        required: false
        default: "64"
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/paczero-mlxlm-large-real-param.yml"

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  large-real-param:
    name: Larger q_proj.bias PACZero-ZPL run
    runs-on: macos-26
    timeout-minutes: 180
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip paczero-large-real-param]') }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PYTHONUNBUFFERED: "1"
      PYTHONWARNINGS: "ignore"
      HF_HUB_DISABLE_PROGRESS_BARS: "1"
      HF_XET_HIGH_PERFORMANCE: "1"
      STEPS: ${{ github.event.inputs.steps || '200' }}
      TRAIN_EXAMPLES: ${{ github.event.inputs.train_examples || '64' }}
      DEV_EXAMPLES: ${{ github.event.inputs.dev_examples || '64' }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MLX-LM dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade mlx mlx-lm huggingface_hub hf_transfer safetensors numpy datasets

      - name: Run larger real-parameter PACZero experiment
        run: |
          mkdir -p benchmark-logs/paczero-mlxlm-large-real-param benchmark-results
          stamp="$(date -u '+%Y%m%dT%H%M%SZ')"
          log_file="benchmark-logs/paczero-mlxlm-large-real-param/paczero-large-real-param-${stamp}.txt"
          latest_file="benchmark-logs/paczero-mlxlm-large-real-param/paczero-large-real-param-latest.txt"
          result_file="benchmark-results/paczero_mlxlm_large_real_param_results.json"
          echo "LOG_FILE=$log_file" >> "$GITHUB_ENV"
          echo "LATEST_FILE=$latest_file" >> "$GITHUB_ENV"
          echo "RESULT_FILE=$result_file" >> "$GITHUB_ENV"
          set -o pipefail
          python scripts/paczero_mlxlm_exhaustive_readiness.py \
            --model mlx-community/Qwen2.5-0.5B-Instruct-4bit \
            --param-paths model.layers.0.self_attn.q_proj.bias \
            --seeds 20260606 \
            --steps "${STEPS}" \
            --train-examples "${TRAIN_EXAMPLES}" \
            --dev-examples "${DEV_EXAMPLES}" \
            --mu 0.05 \
            --lr 0.05 \
            --clip 25.0 \
            --eval-every 25 \
            --json-out "$result_file" \
            2>&1 | tee "$log_file"
          cp "$log_file" "$latest_file"

      - name: Add summary
        if: always()
        run: |
          echo "# PACZero MLX-LM large real-parameter run" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Log: \`${LATEST_FILE:-not-created}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Result JSON: \`${RESULT_FILE:-not-created}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ -f "${LOG_FILE:-}" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            tail -n 260 "$LOG_FILE" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit larger run output
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add benchmark-logs/paczero-mlxlm-large-real-param/ benchmark-results/paczero_mlxlm_large_real_param_results.json || true
          if git diff --cached --quiet; then
            echo "No PACZero large real-parameter output changes to commit."
          else
            git commit -m "Add PACZero large real-parameter run output [skip ci] [skip paczero-large-real-param]"
            git push
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: paczero-mlxlm-large-real-param-results
          path: |
            benchmark-logs/paczero-mlxlm-large-real-param
            benchmark-results/paczero_mlxlm_large_real_param_results.json
          if-no-files-found: warn
