name: PACZero MLX-LM reviewer-proof strict privacy audit

on:
  workflow_dispatch:
    inputs:
      steps:
        description: "PACZero-ZPL LoRA steps per model"
        required: false
        default: "200"
      train_examples:
        description: "Number of SST-2 train examples per model"
        required: false
        default: "128"
      dev_examples:
        description: "Number of SST-2 dev examples per model"
        required: false
        default: "128"
      eval_examples:
        description: "Number of held-out SST-2 eval examples per model"
        required: false
        default: "500"
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/paczero-mlxlm-reviewer-gate.yml"
      - "scripts/paczero_mlxlm_reviewer_gate.py"
      - "scripts/paczero_mlxlm_lora_reproduction.py"

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  reviewer-strict-audit:
    name: Strict ZPL audit ${{ matrix.slug }}
    runs-on: macos-26
    timeout-minutes: 420
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip paczero-reviewer-strict]') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - slug: qwen2.5-0.5b-4bit
            model: mlx-community/Qwen2.5-0.5B-Instruct-4bit
            target_path: model.layers.0.self_attn.q_proj
            seed: 20260609
          - slug: llama-3.2-1b-4bit
            model: mlx-community/Llama-3.2-1B-Instruct-4bit
            target_path: model.layers.0.self_attn.q_proj
            seed: 20260610
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PYTHONUNBUFFERED: "1"
      PYTHONWARNINGS: "ignore"
      HF_HUB_DISABLE_PROGRESS_BARS: "1"
      HF_XET_HIGH_PERFORMANCE: "1"
      STEPS: ${{ github.event.inputs.steps || '200' }}
      TRAIN_EXAMPLES: ${{ github.event.inputs.train_examples || '128' }}
      DEV_EXAMPLES: ${{ github.event.inputs.dev_examples || '128' }}
      EVAL_EXAMPLES: ${{ github.event.inputs.eval_examples || '500' }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MLX-LM dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade mlx mlx-lm huggingface_hub hf_transfer safetensors numpy datasets

      - name: Run strict ZPL privacy audit for ${{ matrix.slug }}
        run: |
          mkdir -p "benchmark-logs/paczero-mlxlm-reviewer-strict/${{ matrix.slug }}" \
                   "benchmark-results/paczero-reviewer-strict/${{ matrix.slug }}" \
                   "benchmark-results/paczero-reviewer-strict-adapters/${{ matrix.slug }}"
          stamp="$(date -u '+%Y%m%dT%H%M%SZ')"
          log_file="benchmark-logs/paczero-mlxlm-reviewer-strict/${{ matrix.slug }}/strict-audit-${stamp}.txt"
          latest_file="benchmark-logs/paczero-mlxlm-reviewer-strict/${{ matrix.slug }}/strict-audit-latest.txt"
          result_file="benchmark-results/paczero-reviewer-strict/${{ matrix.slug }}/strict_privacy_audit_results.json"
          adapter_file="benchmark-results/paczero-reviewer-strict-adapters/${{ matrix.slug }}/qproj_lora_rank8_alpha16_strict.npz"
          echo "LOG_FILE=$log_file" >> "$GITHUB_ENV"
          echo "LATEST_FILE=$latest_file" >> "$GITHUB_ENV"
          echo "RESULT_FILE=$result_file" >> "$GITHUB_ENV"
          echo "ADAPTER_FILE=$adapter_file" >> "$GITHUB_ENV"
          set -o pipefail
          python scripts/paczero_mlxlm_reviewer_gate.py \
            --model "${{ matrix.model }}" \
            --slug "${{ matrix.slug }}" \
            --target-path "${{ matrix.target_path }}" \
            --rank 8 \
            --alpha 16.0 \
            --seed "${{ matrix.seed }}" \
            --steps "${STEPS}" \
            --train-examples "${TRAIN_EXAMPLES}" \
            --dev-examples "${DEV_EXAMPLES}" \
            --eval-examples "${EVAL_EXAMPLES}" \
            --num-subsets 126 \
            --mu 0.05 \
            --lr 0.05 \
            --clip 25.0 \
            --eval-every 50 \
            --json-out "$result_file" \
            --adapter-out "$adapter_file" \
            2>&1 | tee "$log_file"
          cp "$log_file" "$latest_file"

      - name: Add summary
        if: always()
        run: |
          echo "# PACZero-LoRA strict ZPL privacy audit: ${{ matrix.slug }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Model: \`${{ matrix.model }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "M: \`126\`, LoRA: rank 8 alpha 16, strict transcript audit enabled" >> "$GITHUB_STEP_SUMMARY"
          echo "Log: \`${LATEST_FILE:-not-created}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Result JSON: \`${RESULT_FILE:-not-created}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Adapter file: \`${ADAPTER_FILE:-not-created}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ -f "${LOG_FILE:-}" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            tail -n 300 "$LOG_FILE" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit strict audit output for ${{ matrix.slug }}
        if: always()
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "benchmark-logs/paczero-mlxlm-reviewer-strict/${{ matrix.slug }}/" \
                  "benchmark-results/paczero-reviewer-strict/${{ matrix.slug }}/" \
                  "benchmark-results/paczero-reviewer-strict-adapters/${{ matrix.slug }}/" || true
          if git diff --cached --quiet; then
            echo "No strict reviewer audit output changes to commit for ${{ matrix.slug }}."
            exit 0
          fi
          git commit -m "Add strict PACZero reviewer audit output for ${{ matrix.slug }} [skip ci] [skip paczero-reviewer-strict]"
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed strict reviewer audit output for ${{ matrix.slug }} on attempt ${attempt}."
              exit 0
            fi
            echo "Push failed for ${{ matrix.slug }}; rebasing and retrying attempt ${attempt}..."
            git pull --rebase --autostash origin main
          done
          git push

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: paczero-reviewer-strict-${{ matrix.slug }}
          path: |
            benchmark-logs/paczero-mlxlm-reviewer-strict/${{ matrix.slug }}
            benchmark-results/paczero-reviewer-strict/${{ matrix.slug }}
            benchmark-results/paczero-reviewer-strict-adapters/${{ matrix.slug }}
          if-no-files-found: warn
