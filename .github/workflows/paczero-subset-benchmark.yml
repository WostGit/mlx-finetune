name: PACZero subset timing benchmark

on:
  workflow_dispatch:
    inputs:
      paczero_dataset:
        description: "PACZero dataset to sample: sst2 or squad"
        required: false
        default: "sst2"
      subset_size:
        description: "Number of training samples to time"
        required: false
        default: "128"
      batch_size:
        description: "Training batch size"
        required: false
        default: "1"
      lora_layers:
        description: "Number of model layers to LoRA fine-tune"
        required: false
        default: "8"

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  benchmark:
    name: Time PACZero subset on MLX
    runs-on: macos-26
    timeout-minutes: 120
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PYTHONUNBUFFERED: "1"
      PYTHONWARNINGS: "ignore"
      HF_HUB_DISABLE_PROGRESS_BARS: "1"
      HF_XET_HIGH_PERFORMANCE: "1"
      PACZERO_DATASET: ${{ github.event.inputs.paczero_dataset || 'sst2' }}
      SUBSET_SIZE: ${{ github.event.inputs.subset_size || '128' }}
      BENCH_BATCH_SIZE: ${{ github.event.inputs.batch_size || '1' }}
      BENCH_NUM_LAYERS: ${{ github.event.inputs.lora_layers || '8' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade mlx mlx-lm huggingface_hub hf_transfer psutil safetensors datasets

      - name: Run subset timing benchmark
        run: |
          mkdir -p benchmark-logs benchmark-results benchmark-data
          stamp="$(date -u '+%Y%m%dT%H%M%SZ')"
          log_file="benchmark-logs/paczero-${PACZERO_DATASET}-subset-${SUBSET_SIZE}-${stamp}.txt"
          latest_file="benchmark-logs/paczero-${PACZERO_DATASET}-subset-latest.txt"
          set -o pipefail
          python scripts/paczero_subset_bench.py \
            --dataset "${PACZERO_DATASET}" \
            --subset-size "${SUBSET_SIZE}" \
            --batch-size "${BENCH_BATCH_SIZE}" \
            --num-layers "${BENCH_NUM_LAYERS}" \
            2>&1 | tee "$log_file"
          cp "$log_file" "$latest_file"
          echo "LOG_FILE=$log_file" >> "$GITHUB_ENV"
          echo "LATEST_FILE=$latest_file" >> "$GITHUB_ENV"

      - name: Add summary
        if: always()
        run: |
          echo "# PACZero subset timing benchmark" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Latest committed log: \`${LATEST_FILE:-not-created}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ -f "${LOG_FILE:-}" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            tail -n 120 "$LOG_FILE" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit benchmark output
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add benchmark-logs/ benchmark-results/paczero_subset_results.json || true
          if git diff --cached --quiet; then
            echo "No benchmark log changes to commit."
          else
            git commit -m "Add PACZero subset benchmark log [skip ci]"
            git push
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: paczero-subset-timing-results
          path: |
            benchmark-logs
            benchmark-results
          if-no-files-found: warn
